<!-- Flexbox-ში X ღერძზე (ჰორიზონტალურად) ელემენტების განლაგებისთვის ვიყენებთ:

flex-direction: row; ელემენტები დალაგდება ჰორიზონტალურად (მარცხნიდან მარჯვნივ).

justify-content; მართავს ელემენტების პოზიციას X ღერძზე (მარცხნივ, შუაში, მარჯვნივ, ან დაშორებით).

gap; ქმნის სივრცეს (დაშორებას) ელემენტებს შორის.-->
